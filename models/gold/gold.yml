version: 2

models:
  - name: date_dim
    columns:
      - name: date_id
        tests:
          - not_null
          - unique

      - name: store_date
        tests:
          - not_null

  - name: store_dim
    columns:
      - name: store_id
        tests:
          - not_null

      - name: dept_id
        tests:
          - not_null

  - name: fact_table
    columns:
      - name: store_id
        tests:
          - not_null

      - name: dept_id
        tests:
          - not_null

      - name: date_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('date_dim')
                field: date_id